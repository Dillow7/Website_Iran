version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iran_news_app
    restart: unless-stopped
    working_dir: /var/www
    command: bash -lc "chown -R www-data:www-data /var/www/img && apache2-foreground"
    volumes:
      - .:/var/www
      - uploads_img:/var/www/img
    networks:
      - app-network
    depends_on:
      - db
    ports:
      - "8089:80"

  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: iran_news
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    ports:
      - "5433:5432"

volumes:
  postgres_data:
  uploads_img:

networks:
  app-network:
    driver: bridge
